<!DOCTYPE html>
<html lang="mr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fuel Performance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--primary:#1e40af;
--bg:#f1f5f9;
--card:#ffffff;
--border:#e5e7eb;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:"Noto Sans Devanagari",system-ui,sans-serif;
background:var(--bg);
padding:15px 20px 40px;
}

/* HEADER */

.gov-header{
text-align:center;
margin-bottom:25px;
padding-bottom:15px;
border-bottom:3px solid var(--primary);
background:white;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
padding-top:15px;
}

.gov-logos{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-bottom:15px;
}

.center-logo{width:85px;}
.side-logo{width:70px;}

.gov-title{
font-size:24px;
font-weight:700;
color:var(--primary);
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
}

/* INFO */

.info{
background:#eef2ff;
padding:12px;
border-radius:8px;
margin-bottom:20px;
font-weight:600;
color:#1e40af;
}

/* FILTERS */

.filters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:14px;
margin-bottom:25px;
align-items:end;
}

.filters label{
font-size:13px;
font-weight:600;
margin-bottom:4px;
display:block;
}

select,input{
width:100%;
padding:9px;
font-size:14px;
border-radius:8px;
border:1px solid var(--border);
}

button{
padding:10px;
background:var(--primary);
color:white;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
margin-bottom:20px;
}

.card{
background:var(--card);
padding:18px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
text-align:center;
}

.card h3{
margin:5px 0;
font-size:14px;
color:#64748b;
}

.card p{
font-size:26px;
font-weight:bold;
margin-top:5px;
}

/* STATUS */

.good{color:#16a34a;}
.warn{color:#eab308;}
.bad{color:#dc2626;}

/* CHART */

.chart-box{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* LOADER */

.loader{
display:none;
text-align:center;
font-weight:600;
color:#1e40af;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="gov-header">

<div class="gov-logos">
<img src="left-logo.png" class="side-logo">
<img src="main-logo.png" class="center-logo">
<img src="right-logo.png" class="side-logo">
</div>

<div class="gov-title">
यांत्रिकी विभाग मातीकाम माहिती प्रणाली
</div>

</div>

<div class="container">

<h2>⛽ Fuel Performance Dashboard</h2>

<div class="info">
👉 उपविभाग, सयंत्र व दिनांक निवडून इंधन कार्यक्षमता विश्लेषण पहा.
</div>

<!-- FILTERS -->

<div class="filters">

<div>
<label>उपविभाग</label>
<select id="subdivision">
<option value="">उपविभाग निवडा</option>
</select>
</div>

<div>
<label>प्रकार</label>
<select id="category">
<option value="">प्रकार निवडा</option>
</select>
</div>

<div>
<label>सयंत्र</label>
<select id="machine">
<option value="">सयंत्र निवडा</option>
</select>
</div>

<div>
<label>पासून दिनांक</label>
<input type="date" id="fromDate">
</div>

<div>
<label>पर्यंत दिनांक</label>
<input type="date" id="toDate">
</div>

<div>
<button onclick="loadPerformance()">विश्लेषण पहा</button>
</div>

</div>

<div id="loader" class="loader">डेटा लोड होत आहे...</div>

<!-- CARDS -->

<div class="cards">

<div class="card">
<h3>Expected Avg</h3>
<p id="expected">-</p>
</div>

<div class="card">
<h3>Actual Avg</h3>
<p id="actual">-</p>
</div>

<div class="card">
<h3>Total Hours / KM</h3>
<p id="hours">-</p>
</div>

<div class="card">
<h3>Total Diesel</h3>
<p id="diesel">-</p>
</div>

<div class="card">
<h3>Status</h3>
<p id="status">-</p>
</div>

</div>

<div class="chart-box">
<canvas id="effChart"></canvas>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzOhvYrDFrXe6vo7hjeMkuFH0GJ2exdLNfzy9ZyPASiCu-JcmXY7yHTxixNq29tACB5Jg/exec";

let machines=[];
let subs=[];
let chart;

/* CONFIG LOAD */

async function loadConfig(){

const res=await fetch(API+"?mode=config_all");
const data=await res.json();

machines=data.machines;
subs=data.subdivisions;

const subSel=document.getElementById("subdivision");

subs.forEach(s=>{

const op=document.createElement("option");

op.value=s["Subdivision Code"];
op.textContent=s["Subdivision Name"];

subSel.appendChild(op);

});

loadCategory();
setDefaultDates();

}

/* DEFAULT DATES */

function setDefaultDates(){

const today=new Date();

const first=new Date(today.getFullYear(),today.getMonth(),1);

fromDate.value=first.toISOString().split("T")[0];
toDate.value=today.toISOString().split("T")[0];

}

/* CATEGORY */

function loadCategory(){

const catSel=document.getElementById("category");

catSel.innerHTML='<option value="">प्रकार निवडा</option>';

["Machine","Vehicle"].forEach(c=>{

const op=document.createElement("option");

op.value=c;
op.textContent=c;

catSel.appendChild(op);

});

loadMachines();

}

/* MACHINE LIST */

function loadMachines(){

const sub=subdivision.value;
const cat=category.value;

const mSel=document.getElementById("machine");

mSel.innerHTML='<option value="">सयंत्र निवडा</option>';

machines
.filter(m=>m["Subdivision Code"]===sub && m["Category"]===cat)
.forEach(m=>{

const op=document.createElement("option");

op.value=m["Machine Name"];
op.textContent=m["Machine Name"];

mSel.appendChild(op);

});

}

/* PERFORMANCE */

async function loadPerformance(){

const sub=subdivision.value;
const machine=machineSelect();

const from=fromDate.value;
const to=toDate.value;

if(!sub || !machine){
alert("कृपया उपविभाग व सयंत्र निवडा");
return;
}

loader.style.display="block";

const res=await fetch(API+
"?mode=fuel_dashboard&subdivision="+sub+
"&from="+from+
"&to="+to
);

const data=await res.json();

loader.style.display="none";

const row=data.find(d=>d.machine===machine);

if(!row){
alert("डेटा उपलब्ध नाही");
return;
}

updateCards(row);
drawChart(row);

}

/* CARD UPDATE */

function updateCards(row){

expected.innerText=row.expected.toFixed(2);
actual.innerText=row.actual.toFixed(2);
hours.innerText=row.hours.toFixed(1);
diesel.innerText=row.diesel.toFixed(1);

let status="good";
let txt="Good";

if(row.category==="Machine"){

if(row.actual>row.expected*1.1){status="bad";txt="High";}
else if(row.actual>row.expected){status="warn";txt="Slight High";}

}else{

if(row.actual<row.expected*0.9){status="bad";txt="Poor";}
else if(row.actual<row.expected){status="warn";txt="Low";}

}

statusEl.innerText=txt;
statusEl.className=status;

}

/* CHART */

function drawChart(row){

if(chart) chart.destroy();

chart=new Chart(effChart,{

type:"bar",

data:{
labels:["Expected","Actual"],
datasets:[{
data:[row.expected,row.actual],
backgroundColor:["#1e40af","#60a5fa"]
}]
},

options:{
plugins:{legend:{display:false}},
responsive:true
}

});

}

function machineSelect(){
return document.getElementById("machine").value;
}

const statusEl=document.getElementById("status");
const loader=document.getElementById("loader");

subdivision.onchange=loadMachines;
category.onchange=loadMachines;

loadConfig();

</script>

</body>
</html>
